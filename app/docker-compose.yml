version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22
    container_name: node-express-app
    working_dir: /app
    volumes:
      - /Users/jeremeysamaroo/dev/PersonalDev/GitHubHillpointeTest/GitHubHillPointeTest/app:/app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: root
      DB_PASSWORD: root
    command: >
      sh -c "
      npm install -g npm@11.17.0 &&
      npm install -D tsx && 
      npm install &&
      npm run dev
      "
    restart: unless-stopped

volumes:
  postgres_data:

